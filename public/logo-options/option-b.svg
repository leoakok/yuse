<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yuse logo option B  letter Y slingshot">
  <defs>
    <linearGradient id="yuse-b-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Bold Y frame  arms are slingshot forks -->
  <path
    d="M7 5.5 L16 17.5 L25 5.5 M16 17.5 L16 27.5"
    stroke="currentColor"
    stroke-width="5.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Ferrules at fork tips -->
  <circle cx="7" cy="5.5" r="2.8" fill="currentColor"/>
  <circle cx="25" cy="5.5" r="2.8" fill="currentColor"/>
  <!-- Elastic connects fork tips -->
  <path
    d="M8.5 5 C8.5 9.5 12 12.5 16 13 C20 12.5 23.5 9.5 23.5 5"
    stroke="url(#yuse-b-accent)"
    stroke-width="3.2"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Handle notch -->
  <rect x="14.5" y="24" width="3" height="2.5" rx="0.8" fill="currentColor" opacity="0.35"/>
</svg>
