services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cvbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cvbuilder}
      POSTGRES_DB: ${POSTGRES_DB:-cvbuilder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Do not set OPENAI_API_KEY here — an empty host value would override env_file.
      DATABASE_URL: postgres://${POSTGRES_USER:-cvbuilder}:${POSTGRES_PASSWORD:-cvbuilder}@postgres:5432/${POSTGRES_DB:-cvbuilder}?sslmode=disable
      PORT: "8080"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-}
      # GitHub OAuth vars come from backend/.env via env_file above.
      # Do not set GITHUB_* here with ${VAR:-} — an empty host value overrides env_file.
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
