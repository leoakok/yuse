type Mutation {
  createResume(title: String!): Resume!
  duplicateResume(id: ID!): Resume!
  deleteResume(id: ID!): Boolean!
  updateResume(id: ID!, title: String, contactProfileId: ID): Resume!
  updateResumeSettings(input: UpdateResumeSettingsInput!): ResumeSettings!
  updateResumeSectionItemVisibility(input: UpdateResumeSectionItemVisibilityInput!): ResumeWithContent!
  updateResumeSectionItem(input: UpdateResumeSectionItemInput!): ResumeWithContent!
  addResumeSectionItem(input: AddResumeSectionItemInput!): ResumeWithContent!
  deleteSectionItem(resumeId: ID!, sectionItemId: ID!): ResumeWithContent!
  updateContactProfile(input: UpdateContactProfileInput!): ResumeWithContent!
  createPortfolio(title: String!): Portfolio!
  duplicatePortfolio(id: ID!): Portfolio!
  deletePortfolio(id: ID!): Boolean!
  updatePortfolio(id: ID!, title: String, tagline: String, about: String, contactProfileId: ID): Portfolio!
  updatePortfolioSettings(input: UpdatePortfolioSettingsInput!): PortfolioSettings!
  updatePortfolioContactProfile(input: UpdatePortfolioContactProfileInput!): PortfolioWithContent!
  addPortfolioProject(input: AddPortfolioProjectInput!): PortfolioWithContent!
  updatePortfolioProject(input: UpdatePortfolioProjectInput!): PortfolioWithContent!
  deletePortfolioProject(portfolioId: ID!, projectId: ID!): PortfolioWithContent!
  setPortfolioProjectVisibility(input: SetPortfolioProjectVisibilityInput!): PortfolioWithContent!
  addPortfolioSkill(input: AddPortfolioSkillInput!): PortfolioWithContent!
  updatePortfolioSkill(input: UpdatePortfolioSkillInput!): PortfolioWithContent!
  deletePortfolioSkill(portfolioId: ID!, skillId: ID!): PortfolioWithContent!
  addPortfolioTestimonial(input: AddPortfolioTestimonialInput!): PortfolioWithContent!
  updatePortfolioTestimonial(input: UpdatePortfolioTestimonialInput!): PortfolioWithContent!
  deletePortfolioTestimonial(portfolioId: ID!, testimonialId: ID!): PortfolioWithContent!
  requestProfilePhotoUpload(contentType: String!, fileName: String!): ProfilePhotoUpload!
  createTwinEntry(input: CreateTwinEntryInput!): TwinEntry!
  updateTwinEntry(input: UpdateTwinEntryInput!): TwinEntry!
  deleteTwinEntry(id: ID!): Boolean!
  createTrackedJob(url: String!): TrackedJob!
  updateTrackedJob(input: UpdateTrackedJobInput!): TrackedJob!
  deleteTrackedJob(id: ID!): Boolean!
  createAssistantThread: AssistantThread!
  deleteAssistantThread(id: ID!): Boolean!
  sendAssistantMessage(
    threadId: ID!
    text: String!
    context: AssistantContextInput!
    attachments: [AssistantAttachmentInput!] = []
  ): AssistantTurnResult!
  disconnectConnection(provider: ConnectionProvider!): Boolean!
  createKnowledgeEntry(input: CreateKnowledgeEntryInput!): KnowledgeEntry!
  updateKnowledgeEntry(input: UpdateKnowledgeEntryInput!): KnowledgeEntry!
  deleteKnowledgeEntry(id: ID!): Boolean!
}
