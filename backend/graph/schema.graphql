scalar DateTime
scalar JSON

enum SectionType {
  SUMMARY
  EXPERIENCE
  EDUCATION
  SKILLS
  PROJECTS
  CERTIFICATIONS
  LANGUAGES
  ORGANIZATIONS
  PUBLICATIONS
  AWARDS
  VOLUNTEER
  CUSTOM
}

enum AssistantMessageRole {
  USER
  ASSISTANT
  SYSTEM
}

enum AssistantView {
  RESUMES
  SECTIONS
  ITEMS
  RESUME_DETAIL
  PORTFOLIOS
  PORTFOLIO_DETAIL
  DIGITAL_TWIN
  JOB_TRACKER
}

enum JobStatus {
  SAVED
  APPLIED
  INTERVIEW
  OFFER
  REJECTED
}

enum TwinEntryType {
  EXPERIENCE
  EDUCATION
  PROJECT
  SKILL_AREA
  OTHER
}

enum FontSize {
  XS
  S
  M
  L
  XL
}

enum PageFormat {
  A4
  LETTER
}

"""How section item title and subtitle (role/company, degree/school, etc.) are laid out."""
enum ItemTitleLayout {
  STACKED
  INLINE
}

"""Spoken language proficiency — stored in section item metadata.level (LANGUAGES)."""
enum LanguageLevel {
  BEGINNER
  INTERMEDIATE
  PROFICIENT
  FLUENT
  NATIVE
}

"""Technical/professional skill proficiency — stored in section item metadata.level (SKILLS) and Twin SKILL_AREA."""
enum SkillLevel {
  BEGINNER
  INTERMEDIATE
  PROFICIENT
  ADVANCED
  EXPERT
}

enum ConnectionProvider {
  GITHUB
}

"""Platform role. ADMIN can manage the knowledge dictionary and view the agent experiment page."""
enum UserRole {
  USER
  ADMIN
}

"""Detected request category from the cheap intent layer that runs before the main agent."""
enum AssistantCategory {
  UPDATE_CV
  CREATE_CV
  PORTFOLIO
  JOB_APPLICATION
  ADVICE
  OUT_OF_SCOPE
  CHITCHAT
  UNCLEAR
}

type ConnectionStatus {
  provider: ConnectionProvider!
  connected: Boolean!
  username: String
  avatarUrl: String
  connectedAt: DateTime
}

type User {
  id: ID!
  email: String!
  displayName: String!
  avatarUrl: String
  role: UserRole!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A curated, tag-keyed guidance entry the agent injects into context based on the detected category."""
type KnowledgeEntry {
  id: ID!
  slug: String!
  title: String!
  category: AssistantCategory!
  tags: [String!]!
  body: String!
  enabled: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Result of the cheap pre-classification layer, exposed for the admin experiment page."""
type AssistantClassification {
  category: AssistantCategory!
  confidence: Float!
  tags: [String!]!
  reason: String!
  """Where the decision came from: fast-path, classifier, or fallback."""
  source: String!
  """True when the request is handled before the main agent (out of scope, unclear, greeting)."""
  scopeHandled: Boolean!
  """The canned reply used when scopeHandled is true (out of scope / unclear / greeting)."""
  cannedReply: String
  """Dictionary entries selected for this category/tags."""
  selectedEntries: [KnowledgeEntry!]!
  """The guidance block that would be injected into the main agent prompt."""
  guidance: String!
}

type Workspace {
  id: ID!
  name: String!
  slug: String!
  ownerId: ID!
  plan: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type WorkspaceStats {
  resumeCount: Int!
  portfolioCount: Int!
  sectionCount: Int!
  sectionItemCount: Int!
}

type ContactProfile {
  id: ID!
  workspaceId: ID!
  fullName: String!
  headline: String
  email: String
  phone: String
  location: String
  website: String
  linkedIn: String
  github: String
  photoUrl: String
  linkedinPhotoUrl: String
  githubPhotoUrl: String
  effectivePhotoUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SectionItem {
  id: ID!
  workspaceId: ID!
  type: SectionType!
  headline: String!
  body: String!
  metadata: JSON!
  showInPreview: Boolean!
  createdBy: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Section {
  id: ID!
  workspaceId: ID!
  type: SectionType!
  title: String!
  description: String
  createdBy: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Resume {
  id: ID!
  workspaceId: ID!
  title: String!
  contactProfileId: ID
  createdBy: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ResumeSettings {
  resumeId: ID!
  themeId: ID!
  fontSize: FontSize!
  contactNameFontSize: FontSize!
  contactHeadlineFontSize: FontSize!
  contactDetailsFontSize: FontSize!
  sectionTitleFontSize: FontSize!
  itemTitleFontSize: FontSize!
  itemMetaFontSize: FontSize!
  pageFormat: PageFormat!
  marginHorizontalMm: Float!
  marginVerticalMm: Float!
  showPhoto: Boolean!
  itemTitleLayout: ItemTitleLayout!
  locale: String!
}

type CvTheme {
  id: ID!
  name: String!
  slug: String!
  isSystem: Boolean!
  config: JSON!
}

type SectionWithItems {
  section: Section!
  items: [SectionItem!]!
}

type ResumeWithContent {
  resume: Resume!
  contactProfile: ContactProfile
  settings: ResumeSettings!
  theme: CvTheme!
  sections: [SectionWithItems!]!
}

enum PortfolioLayout {
  SINGLE
  SPLIT
}

type Portfolio {
  id: ID!
  workspaceId: ID!
  title: String!
  tagline: String!
  about: String!
  contactProfileId: ID
  createdBy: ID!
