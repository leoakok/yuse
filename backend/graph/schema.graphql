  updatePortfolioProject(input: UpdatePortfolioProjectInput!): PortfolioWithContent!
  deletePortfolioProject(portfolioId: ID!, projectId: ID!): PortfolioWithContent!
  setPortfolioProjectVisibility(input: SetPortfolioProjectVisibilityInput!): PortfolioWithContent!
  addPortfolioSkill(input: AddPortfolioSkillInput!): PortfolioWithContent!
  updatePortfolioSkill(input: UpdatePortfolioSkillInput!): PortfolioWithContent!
  deletePortfolioSkill(portfolioId: ID!, skillId: ID!): PortfolioWithContent!
