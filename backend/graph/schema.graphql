  updatePortfolioTestimonial(input: UpdatePortfolioTestimonialInput!): PortfolioWithContent!
  deletePortfolioTestimonial(portfolioId: ID!, testimonialId: ID!): PortfolioWithContent!
  requestProfilePhotoUpload(contentType: String!, fileName: String!): ProfilePhotoUpload!
