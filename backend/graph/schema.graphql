  updatedAt: DateTime!
}

type TrackedJob {
  id: ID!
  workspaceId: ID!
  url: String!
  title: String!
  company: String!
  status: JobStatus!
  notes: String!
  resumeId: ID
  coverLetter: String!
  metadata: JSON!
  createdBy: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
}

input AssistantContextInput {
  view: AssistantView!
  resumeId: ID
  portfolioId: ID
  sectionId: ID
  sectionItemId: ID
  jobId: ID
}

input AssistantAttachmentInput {
  name: String!
  mimeType: String!
  contentBase64: String
  extractedText: String
}

type AssistantThread {
  id: ID!
  workspaceId: ID!
  createdAt: DateTime!
  updatedAt: DateTime!
  preview: String
}

type AssistantMessage {
  id: ID!
  threadId: ID!
  role: AssistantMessageRole!
  content: String!
  context: JSON
  createdAt: DateTime!
}

type AssistantActionLog {
  id: ID!
  messageId: ID!
  op: String!
  payload: JSON!
  success: Boolean!
  error: String
  createdAt: DateTime!
}

type AssistantTurnResult {
  messages: [AssistantMessage!]!
  actionLogs: [AssistantActionLog!]!
  affectedResumeIds: [ID!]!
  affectedPortfolioIds: [ID!]!
  resumeWithContent: ResumeWithContent
  portfolioWithContent: PortfolioWithContent
}

type Query {
  me: User!
  myWorkspace: Workspace!
  workspaceStats: WorkspaceStats!
  resumes: [Resume!]!
  resume(id: ID!): Resume
  sections(type: SectionType): [Section!]!
  section(id: ID!): Section
  sectionItems(type: SectionType): [SectionItem!]!
  sectionItem(id: ID!): SectionItem
  contactProfiles: [ContactProfile!]!
  cvThemes: [CvTheme!]!
  resumeWithContent(id: ID!): ResumeWithContent
  portfolios: [Portfolio!]!
  portfolio(id: ID!): Portfolio
  portfolioWithContent(id: ID!): PortfolioWithContent
  sectionItemUsage(id: ID!): SectionItemUsage
  sectionItemsForSection(sectionId: ID!): [SectionItem!]!
  resumesForSection(sectionId: ID!): [Resume!]!
  assistantThreads: [AssistantThread!]!
  assistantMessages(threadId: ID!, limit: Int = 50): [AssistantMessage!]!
  twinEntries: [TwinEntry!]!
  twinEntry(id: ID!): TwinEntry
  trackedJobs: [TrackedJob!]!
  trackedJob(id: ID!): TrackedJob
  connectionStatus(provider: ConnectionProvider!): ConnectionStatus!
  """Admin only. Lists the knowledge dictionary entries."""
  knowledgeEntries(includeDisabled: Boolean = true): [KnowledgeEntry!]!
  """Admin only. Runs the cheap intent layer for a test message and returns the breakdown."""
  classifyAssistantMessage(text: String!, context: AssistantContextInput!): AssistantClassification!
}

